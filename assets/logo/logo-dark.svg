<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100" role="img" aria-label="PARCO – Parallel Computing Lab">
  <title>PARCO – Parallel Computing Lab</title>

  <!--
    DARK THEME variant.
    Filled grid cells: lighter blue #4E8EC4 (readable on dark bg).
    Outline cells: subtle dark stroke.
    Wordmark: near-white #E8EDF2.
    Subtitle: muted blue #7AADCF.
  -->

  <!-- ── Pixel grid ── -->
  <g>
    <!-- row 0 -->
    <rect x="4"  y="8"  width="14" height="14" rx="1" fill="none"   stroke="#3A5570" stroke-width="1.2"/>
    <rect x="21" y="8"  width="14" height="14" rx="1" fill="#4E8EC4" stroke="none"/>
    <rect x="38" y="8"  width="14" height="14" rx="1" fill="#4E8EC4" stroke="none"/>
    <rect x="55" y="8"  width="14" height="14" rx="1" fill="none"   stroke="#3A5570" stroke-width="1.2"/>
    <!-- row 1 -->
    <rect x="4"  y="25" width="14" height="14" rx="1" fill="#4E8EC4" stroke="none"/>
    <rect x="21" y="25" width="14" height="14" rx="1" fill="none"   stroke="#3A5570" stroke-width="1.2"/>
    <rect x="38" y="25" width="14" height="14" rx="1" fill="none"   stroke="#3A5570" stroke-width="1.2"/>
    <rect x="55" y="25" width="14" height="14" rx="1" fill="#4E8EC4" stroke="none"/>
    <!-- row 2 -->
    <rect x="4"  y="42" width="14" height="14" rx="1" fill="#4E8EC4" stroke="none"/>
    <rect x="21" y="42" width="14" height="14" rx="1" fill="none"   stroke="#3A5570" stroke-width="1.2"/>
    <rect x="38" y="42" width="14" height="14" rx="1" fill="none"   stroke="#3A5570" stroke-width="1.2"/>
    <rect x="55" y="42" width="14" height="14" rx="1" fill="#4E8EC4" stroke="none"/>
    <!-- row 3 -->
    <rect x="4"  y="59" width="14" height="14" rx="1" fill="none"   stroke="#3A5570" stroke-width="1.2"/>
    <rect x="21" y="59" width="14" height="14" rx="1" fill="#4E8EC4" stroke="none"/>
    <rect x="38" y="59" width="14" height="14" rx="1" fill="#4E8EC4" stroke="none"/>
    <rect x="55" y="59" width="14" height="14" rx="1" fill="none"   stroke="#3A5570" stroke-width="1.2"/>
  </g>

  <!-- ── PARCO wordmark ── -->
  <text
    x="83" y="68"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="58"
    font-weight="900"
    fill="#E8EDF2"
    letter-spacing="-1"
  >PARCO</text>

  <!-- thin rule -->
  <rect x="83" y="73" width="232" height="1.5" fill="#4E8EC4" opacity="0.4"/>

  <!-- subtitle -->
  <text
    x="85" y="90"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="14"
    font-weight="500"
    fill="#7AADCF"
    letter-spacing="0.3"
  >Parallel Computing Lab</text>
</svg>
